<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Engineering AI Assistant – Helical Gear Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="ai.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f0f4ff; }
        body.dark-mode { background: #111827; color: #e5e7eb; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="navbar-brand">⚙️ Gear Calc</a>
            <ul class="navbar-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="ai.html" class="active">AI Assistant</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle" onclick="toggleDarkMode()">🌙</button>
        </div>
    </nav>

    <div class="content-wrapper flex flex-col items-center pt-8 px-4">
        <div class="main-card w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-[80vh]">
            <!-- Header -->
            <div class="p-6 border-b border-indigo-100 bg-gradient-to-r from-indigo-50 to-white flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-2xl">
                    🤖
                </div>
                <div>
                    <h1 class="text-xl font-bold text-indigo-900">Engineering AI</h1>
                    <p class="text-sm text-indigo-500 font-medium">Ask about gear ratios, torque, or materials</p>
                </div>
            </div>

            <!-- Chat Container -->
            <div id="chatContainer" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50">
                <!-- Welcome Message -->
                <div class="flex justify-start">
                    <div class="bg-white border border-indigo-100 p-4 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm">
                        <p class="text-sm text-gray-700 leading-relaxed">
                            Hello! I am your Engineering Assistant. How can I help you with your mechanical calculations today?
                        </p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 border-t border-gray-100 bg-white">
                <form id="aiForm" class="flex gap-2">
                    <input type="text" id="userInput" 
                        class="flex-1 p-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" 
                        placeholder="Type your engineering question..." required>
                    <button type="submit" id="sendBtn" 
                        class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold text-sm hover:bg-indigo-700 transition-colors flex items-center gap-2">
                        Send
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer mt-12">
        <div class="footer-bottom">
            <p>&copy; 2026 Helical Gear Calculator | Powered by OpenRouter AI</p>
        </div>
    </footer>

    <script src="ai.js"></script>
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeToggle').textContent = '☀️';
        }
    </script>
</body>
</html>
